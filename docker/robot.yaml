serial_number: j100-0000
version: 0

system:
  hosts:
    - hostname: localhost
      ip: 127.0.0.1
  ros2:
    namespace: j100

platform:
  model: j100

sensors:
  lidar2d:
    - model: hokuyo_ust
      urdf_enabled: true
      launch_enabled: true
      parent: default_mount
      xyz: [0.1, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        hokuyo_node:
          laser_frame_id: laser_link
          topic: scan
          skip: 2 

  camera:
    - model: intel_realsense
      urdf_enabled: true
      launch_enabled: true
      parent: default_mount
      xyz: [0.15, 0.0, 0.05]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        intel_realsense:
          camera_name: camera_0
          device_type: d435
          serial_no: "0"
          
          # High Detail RGB
          enable_color: true
          rgb_camera.color_profile: 1280,720,30
          
          # Detailed & Correct Depth
          enable_depth: true
          depth_module.depth_profile: 1280,720,30
          
          # Alignment & Cloud (Crucial for "Canonical" Accuracy)
          align_depth.enable: true
          pointcloud.enable: true
          pointcloud.ordered_pc: true
          
          # Simulation Range Fix
          clip_distance: 10.0